<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Coba API Bypasser Strp2p</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            padding: 40px;
            max-width: 700px;
            margin: 0 auto;
        }
        h2 { color: #00ff88; }
        .box {
            background-color: #2a2a35;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        input, button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 4px;
            border: none;
            box-sizing: border-box;
        }
        input { background-color: #3b3b4f; color: #fff; font-size: 16px; }
        button {
            background-color: #00ff88;
            color: #1e1e24;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background-color: #00cc6e; }
        pre {
            background-color: #111;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            color: #ffb86c;
            max-height: 250px;
            font-size: 13px;
        }
        .success-text { color: #00ff88; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

    <h2>⚡ Strp2p API Bypass Tester</h2>
    <p>Masukkan ID video untuk menguji respons gabungan API info & player.</p>

    <div class="box">
        <label for="videoId">ID Video Target:</label>
        <input type="text" id="videoId" value="auj9k" placeholder="Contoh: auj9k">
        <button onclick="jalankanUjiCoba()">Tembak API & Bongkar</button>
    </div>

    <div class="box" id="resultBox" style="display: none;">
        <h3>🟢 Hasil Tangkapan API Vercel</h3>
        
        <p><strong>Kunci Dekripsi (k) yang didapat:</strong></p>
        <span id="keyOutput" class="success-text">-</span>

        <p><strong>Link Segmen CDN/Manifes (Simulasi):</strong></p>
        <div id="linkStream" class="success-text" style="background: #111; padding: 10px; border-radius: 4px; color: #00ffaa;">
            Menunggu proses dekripsi...
        </div>

        <p><strong>Isi Payload Mentah Terenkripsi (Hex):</strong></p>
        <pre id="payloadOutput">Loading...</pre>
    </div>

    <script>

            const resultBox = document.getElementById('resultBox');
            const keyOutput = document.getElementById('keyOutput');
            const payloadOutput = document.getElementById('payloadOutput');
            const linkStream = document.getElementById('linkStream');

            if (!id) return alert("ID Video tidak boleh kosong!");

            resultBox.style.display = "block";
            payloadOutput.innerText = "Sedang mengambil data dari backend...";
            linkStream.innerText = "Memproses...";

            try {
                // SANGAT PENTING: Ganti URL ini dengan URL Production setelah kamu deploy ke Vercel nanti!
                // Contoh: https://nama-proyekmu.vercel.app/api/stream?id=${id}
                const localBypassUrl = `http://localhost:3000/api/stream?id=${id}`; 
                
                // Sebagai alternatif uji coba cepat sebelum deploy Vercel, kita bisa tembak tiruan mock data
